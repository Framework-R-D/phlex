# ######################################################################
# In this environment, we specify that some packages be built with the
# native compiler (currently GCC 13 on Ubuntu 24.04), and others with
# the compiler required to build Phlex (currently GCC 15).
# ######################################################################

spack:
  specs:
    - phlex
    - catch2
    - cmake
    - lcov
    - ninja
    - py-gcovr
    - py-pytest-cov # Needed for Python coverage reports
    - py-pyyaml # Needed by run-clang-tidy --export-fixes to merge per-TU fix files
    - |
      llvm@22.1.1 +zstd +llvm_dylib +link_llvm_dylib ~lldb targets=x86

  view: true

  concretizer:
    unify: true
    reuse:
      from:
        - type: external
        - type: local
        - type: buildcache

  packages:
    all:
      target:
        - x86_64_v3

    cmake:
      require:
        - "%c,cxx=gcc@13"
        - "~qtgui"
        - "@4:"

    phlex:
      require:
        - "+form"
        - "cxxstd=23"
        - "%gcc@15"

    # GCC 15 uses C23 as the default C language, and the versions of
    # libunwind and unuran available in Spack (as of 8/12/2025) do not
    # yet support C23.
    libunwind:
      require:
        - "cflags='-std=c17'"

    unuran:
      require:
        - "cflags='-std=c17'"

    # ROOT should be built with the same version of the C++ standard
    # as will be used by Phlex (C++23 for now).
    root:
      require:
        - "~x" # No graphics libraries required
        - "cxxstd=23"
