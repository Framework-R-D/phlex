[tool.mypy]
ignore_missing_imports = true
no_implicit_optional = true
plugins = [
]
show_error_codes = true
warn_unreachable = true
disable_error_code = "annotation-unchecked"

[tool.pyright]
# NOTE: this table is Pylance/Pyright's highest-precedence configuration
# source: once it exists, python.analysis.extraPaths (and include/exclude/
# ignore/typeCheckingMode/etc.) set via VS Code settings.json or a
# .code-workspace file are ignored entirely. Update extraPaths here, not
# there. Paths are relative to this file's directory (the repo root) unless
# absolute; VS Code variables like ${workspaceFolder} are NOT substituted
# here. The Spack-specific absolute paths only exist inside the phlex-dev
# devcontainer and are harmless no-ops elsewhere.
extraPaths = [
    "plugins/python/python",
    "scripts",
    "build/_deps",
    "out/build/*/_deps",
    "/opt/spack-environments/phlex-ci/.spack-env/view/lib/root",
    "/opt/spack-environments/phlex-ci/.spack-env/view/lib/python/site-packages",
    "/spack/lib/spack",
]


[tool.ruff]
target-version = "py312"
line-length = 99

[tool.ruff.lint]
select = [
  "B",  # flake8-bugbear
  "C4", # flake8-comprehensions
  "D",  # pydocstyle
  "E",  # pycodestyle errors
  "F",  # pyflakes
  "I",  # isort
  "W",  # pycodestyle warnings
]
ignore = []
extend-ignore = [
    "E731", # do not assign a lambda expression, use a def
    "E203", # whitespace before ':'
]

[tool.ruff.lint.isort]
# Scripts are treated as first-party so that `import clang_tidy_check_summary`
# and similar local imports are grouped correctly relative to third-party ones
# (e.g. pytest), avoiding false I001 violations in scripts/test/.
known-first-party = [
  "check_codeql_alerts",
  "clang_tidy_check_summary",
  "clang_tidy_diff_issues",
  "clang_tidy_fixes_to_problems",
  "codeql_reset_dismissed_alerts",
  "create_coverage_symlinks",
  "export_llvm_lcov",
  "fix_header_guards",
  "normalize_coverage_lcov",
  "normalize_coverage_xml",
  "sarif_alerts",
]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.format]
quote-style = "double"

[tool.coverage.run]
# Exclude the test helpers from coverage measurement.  pytest-cov resolves
# this glob relative to the measurement source root (scripts/), so the pattern
# works whether pytest is invoked from the repo root or a build directory that
# sets --cov=scripts.
omit = ["scripts/test/*"]
