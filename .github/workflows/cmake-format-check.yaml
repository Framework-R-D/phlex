name: CMake Format Check
run-name: "${{ github.actor }} checking CMake format"

permissions:
  contents: read
  pull-requests: read

"on":
  pull_request:
  workflow_dispatch:
    inputs:
      ref:
        description: "The branch, ref, or SHA to checkout. Defaults to the repository's default branch."
        required: false
        type: string
  workflow_call:
    inputs:
      checkout-path:
        description: "Path to check out code to"
        required: false
        type: string
      skip-relevance-check:
        description: "Bypass relevance check"
        required: false
        type: boolean
        default: false
      pr-base-sha:
        description: "Base SHA of the PR for relevance check"
        required: false
        type: string
      pr-head-sha:
        description: "Head SHA of the PR for relevance check"
        required: false
        type: string
      ref:
        description: "The branch, ref, or SHA to checkout"
        required: false
        type: string
      repo:
        description: "The repository to checkout from"
        required: false
        type: string

env:
  local_checkout_path:
    ${{ (github.event_name == 'workflow_call' && inputs.checkout-path) || format('{0}-src',
    github.event.repository.name) }}

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      is_act: ${{ steps.setup.outputs.is_act }}
      ref: ${{ steps.setup.outputs.ref }}
      repo: ${{ steps.setup.outputs.repo }}
      base_sha: ${{ steps.setup.outputs.base_sha }}
      pr_number: ${{ steps.setup.outputs.pr_number }}
      checkout_path: ${{ steps.setup.outputs.checkout_path }}
      has_changes: ${{ steps.setup.outputs.has_changes }}
    steps:
      - name: Workflow setup
        id: setup
        uses: ./.github/actions/workflow-setup
        with:
          file-type: cmake

  cmake-format-check:
    needs: setup
    if: >
      always() && needs.setup.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.setup.outputs.ref }}
          path: ${{ env.local_checkout_path }}
          repository: ${{ needs.setup.outputs.repo }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.x"

      - name: Install gersemi
        run: pip install gersemi

      - name: Check CMake formatting
        id: lint
        run: |
          echo "➡️ Checking CMake file formatting..."
          gersemi --check ${{ env.local_checkout_path }}
        continue-on-error: true

      - name: Evaluate CMake formatting result
        if: always() && steps.lint.outcome != 'skipped'
        # yamllint disable rule:line-length
        run: |
          if [ "${{ steps.lint.outcome }}" = 'success' ]; then
            echo "✅ All CMake files are properly formatted."
          else
            echo "::error::Found files with formatting issues."
            echo "::error::Run 'gersemi -i <file>' locally or comment '@${{ github.event.repository.name }}bot format' on the PR to auto-fix."
            exit 1
          fi
        # yamllint enable
