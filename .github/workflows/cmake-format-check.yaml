name: CMake Format Check
run-name: "${{ github.actor }} checking CMake format"

permissions:
  contents: read
  pull-requests: read

"on":
  pull_request:
  push:
    branches: ["release/*"]
  workflow_dispatch:
    inputs:
      ref:
        description: "The branch, ref, or SHA to checkout. Defaults to the repository's default branch."
        required: false
        type: string
  workflow_call:
    inputs:
      checkout-path:
        description: "Path to check out code to"
        required: false
        type: string
      skip-relevance-check:
        description: "Bypass relevance check"
        required: false
        type: boolean
        default: false
      pr-base-sha:
        description: "Base SHA of the PR for relevance check"
        required: false
        type: string
      pr-head-sha:
        description: "Head SHA of the PR for relevance check"
        required: false
        type: string
      ref:
        description: "The branch, ref, or SHA to checkout"
        required: false
        type: string
      repo:
        description: "The repository to checkout from"
        required: false
        type: string

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      is_act: ${{ steps.setup.outputs.is_act }}
      ref: ${{ steps.setup.outputs.ref }}
      repo: ${{ steps.setup.outputs.repo }}
      base_sha: ${{ steps.setup.outputs.base_sha }}
      pr_number: ${{ steps.setup.outputs.pr_number }}
      checkout_path: ${{ steps.setup.outputs.checkout_path }}
      has_changes: ${{ steps.setup.outputs.has_changes }}
    steps:
      - name: Workflow setup
        id: setup
        uses: Framework-R-D/action-workflow-setup@f73307dd8c13cb66c2565c9ace32571517b1cea8 # v1
        with:
          file-type: cmake
          head-ref: ${{ inputs.pr-head-sha }}
          ref: ${{ inputs.ref }}
          repo: ${{ inputs.repo }}
          pr-base-sha: ${{ inputs.pr-base-sha }}
          checkout-path: ${{ inputs.checkout-path }}

  cmake-format-check:
    needs: setup
    if: >
      always() && (
        github.event_name == 'workflow_dispatch' ||
        inputs.skip-relevance-check ||
        needs.setup.outputs.has_changes == 'true'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.setup.outputs.ref }}
          path: ${{ needs.setup.outputs.checkout_path }}
          repository: ${{ needs.setup.outputs.repo }}
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install gersemi
        run: uv tool install gersemi

      - name: Check CMake formatting
        id: lint
        env:
          CHECKOUT_PATH: ${{ needs.setup.outputs.checkout_path }}
        run: |
          echo "➡️ Checking CMake file formatting..."
          gersemi --check "${CHECKOUT_PATH}"
        continue-on-error: true

      - name: Evaluate CMake formatting result
        if: always() && steps.lint.outcome != 'skipped'
        env:
          REPO: ${{ needs.setup.outputs.repo }}
        # yamllint disable rule:line-length
        run: |
          REPO_NAME="${REPO##*/}"
          if [ "${{ steps.lint.outcome }}" = 'success' ]; then
            echo "✅ All CMake files are properly formatted."
          else
            echo "::error::Found files with formatting issues."
            echo "::error::Run 'gersemi -i <file>' locally or comment '@${REPO_NAME}bot format' on the PR to auto-fix."
            exit 1
          fi
        # yamllint enable
