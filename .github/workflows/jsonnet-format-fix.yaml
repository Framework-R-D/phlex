name: Jsonnet Format Fix
run-name: "${{ github.actor }} fixing Jsonnet format"

"on":
  issue_comment:
    types:
      - created
  workflow_dispatch:
    inputs:
      ref:
        description:
          "The branch name to checkout and push fixes to (must be a branch, not a commit SHA). Defaults to the
          repository's default branch."
        required: false
        type: string
  workflow_call:
    inputs:
      checkout-path:
        description: "Path to check out code to"
        required: false
        type: string
      ref:
        description: "The branch name to checkout and push fixes to (must be a branch, not a commit SHA)"
        required: true
        type: string
      repo:
        description: "The repository to checkout from"
        required: true
        type: string
      skip-comment:
        description: "Skip posting PR comments"
        required: false
        type: string
        default: "false"
    outputs:
      changes:
        description: "Whether any fixes were applied"
        value: ${{ jobs.apply_jsonnet_formatting.outputs.changes }}
      pushed:
        description: "Whether the fixes were pushed to the remote branch"
        value: ${{ jobs.apply_jsonnet_formatting.outputs.pushed }}
      commit_sha:
        description: "The full commit SHA of the applied fixes"
        value: ${{ jobs.apply_jsonnet_formatting.outputs.commit_sha }}
      commit_sha_short:
        description: "The short commit SHA of the applied fixes"
        value: ${{ jobs.apply_jsonnet_formatting.outputs.commit_sha_short }}
      patch_name:
        description: "Name of the patch file if fixes could not be pushed"
        value: ${{ jobs.apply_jsonnet_formatting.outputs.patch_name }}

permissions:
  pull-requests: write
  contents: write

env:
  local_checkout_path: ${{ inputs.checkout-path || format('{0}-src', github.event.repository.name) }}

jobs:
  setup:
    runs-on: ubuntu-latest
    name: Parse command
    if: >
      inputs.ref != '' ||
      github.event_name == 'workflow_dispatch' || (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(fromJSON('["OWNER", "COLLABORATOR", "MEMBER"]'), github.event.comment.author_association) &&
        startsWith(github.event.comment.body, format('@{0}bot jsonnet-fix', github.event.repository.name))
      )
    outputs:
      ref: ${{ steps.setup.outputs.ref }}
      repo: ${{ steps.setup.outputs.repo }}
      checkout_path: ${{ steps.setup.outputs.checkout_path }}
    steps:
      - name: Workflow setup
        id: setup
        uses: ./.github/actions/workflow-setup
        with:
          mode: fix
          ref: ${{ inputs.ref }}
          repo: ${{ inputs.repo }}
          checkout-path: ${{ inputs.checkout-path }}

  apply_jsonnet_formatting:
    runs-on: ubuntu-latest
    name: Apply Jsonnet formatting
    needs: setup
    if: needs.setup.result == 'success'
    outputs:
      changes: ${{ steps.handle_commit.outputs.changes }}
      pushed: ${{ steps.handle_commit.outputs.pushed }}
      commit_sha: ${{ steps.handle_commit.outputs.commit_sha }}
      commit_sha_short: ${{ steps.handle_commit.outputs.commit_sha_short }}
      patch_name: ${{ steps.handle_commit.outputs.patch_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: ${{ needs.setup.outputs.checkout_path }}
          ref: ${{ needs.setup.outputs.ref }}
          repository: ${{ needs.setup.outputs.repo }}
          token: ${{ secrets.WORKFLOW_PAT }}

      - name: Apply Jsonnet formatting
        id: lint
        env:
          CHECKOUT_PATH: ${{ env.local_checkout_path }}
        # yamllint disable rule:line-length
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" -w /work --user root public.ecr.aws/bitnami/jsonnet:latest \
            sh -c "find \"$CHECKOUT_PATH\" \( -name '*.jsonnet' -o -name '*.libsonnet' \) -print0 | xargs -0 -r jsonnetfmt -i"
        # yamllint enable
        continue-on-error: true

      - name: Handle fix commit
        id: handle_commit
        uses: ./.github/actions/handle-fix-commit
        with:
          tool: jsonnetfmt
          working-directory: ${{ needs.setup.outputs.checkout_path }}
          token: ${{ secrets.WORKFLOW_PAT }}
          pr-info-ref: ${{ needs.setup.outputs.ref }}
          pr-info-repo: ${{ needs.setup.outputs.repo }}
          skip-comment: ${{ inputs.skip-comment || 'false' }}

      - name: Update PR comment reactions
        if: always() && github.event_name == 'issue_comment' && inputs.skip-comment != 'true'
        uses: ./.github/actions/complete-pr-comment
        with:
          status: ${{ job.status }}
