name: Header Guards Check
run-name: "${{ github.actor }} checking header guards"

permissions:
  contents: read
  pull-requests: read

"on":
  pull_request:
  workflow_dispatch:
    inputs:
      ref:
        description: "The branch, ref, or SHA to checkout. Defaults to the repository's default branch."
        required: false
        type: string
  workflow_call:
    inputs:
      checkout-path:
        description: "Path to check out code to"
        required: false
        type: string
      skip-relevance-check:
        description: "Bypass relevance check"
        required: false
        type: boolean
        default: false
      pr-base-sha:
        description: "Base SHA of the PR for relevance check"
        required: false
        type: string
      pr-head-sha:
        description: "Head SHA of the PR for relevance check"
        required: false
        type: string
      ref:
        description: "The branch, ref, or SHA to checkout"
        required: false
        type: string
      repo:
        description: "The repository to checkout from"
        required: false
        type: string

env:
  local_checkout_path:
    ${{ (github.event_name == 'workflow_call' && inputs.checkout-path) || format('{0}-src',
    github.event.repository.name) }}

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      is_act: ${{ steps.setup.outputs.is_act }}
      ref: ${{ steps.setup.outputs.ref }}
      repo: ${{ steps.setup.outputs.repo }}
      base_sha: ${{ steps.setup.outputs.base_sha }}
      pr_number: ${{ steps.setup.outputs.pr_number }}
      checkout_path: ${{ steps.setup.outputs.checkout_path }}
      has_changes: ${{ steps.setup.outputs.has_changes }}
    steps:
      - name: Workflow setup
        id: setup
        uses: Framework-R-D/phlex/.github/actions/workflow-setup@copilot/sub-pr-411-another-one
        with:
          file-type: cpp

  header-guards-check:
    needs: setup
    if: >
      always() && needs.setup.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.setup.outputs.ref }}
          path: ${{ env.local_checkout_path }}
          repository: ${{ needs.setup.outputs.repo }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Check header guards
        id: check
        working-directory: ${{ env.local_checkout_path }}
        run: |
          python3 scripts/fix_header_guards.py --check --root . phlex plugins form > check_output.txt 2>&1 || echo "has_issues=true" >> "$GITHUB_OUTPUT"
          cat check_output.txt

      - name: Report results
        if: always() && steps.check.outputs.has_issues == 'true'
        run: |
          echo "::error::Header guard check failed."
          echo "::error::Comment '@${{ github.event.repository.name }}bot header-guards-fix' on the PR to auto-fix."
          exit 1
