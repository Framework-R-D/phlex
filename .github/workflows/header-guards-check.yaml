name: Header Guards Check
run-name: "${{ github.actor }} checking header guards"

permissions:
  contents: read
  pull-requests: read

"on":
  pull_request:
  push:
    branches: ["release/*"]
  workflow_dispatch:
    inputs:
      ref:
        description: "The branch, ref, or SHA to checkout. Defaults to the repository's default branch."
        required: false
        type: string
  workflow_call:
    inputs:
      checkout-path:
        description: "Path to check out code to"
        required: false
        type: string
      skip-relevance-check:
        description: "Bypass relevance check"
        required: false
        type: boolean
        default: false
      pr-base-sha:
        description: "Base SHA of the PR for relevance check"
        required: false
        type: string
      pr-head-sha:
        description: "Head SHA of the PR for relevance check"
        required: false
        type: string
      ref:
        description: "The branch, ref, or SHA to checkout"
        required: false
        type: string
      repo:
        description: "The repository to checkout from"
        required: false
        type: string

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      is_act: ${{ steps.setup.outputs.is_act }}
      ref: ${{ steps.setup.outputs.ref }}
      repo: ${{ steps.setup.outputs.repo }}
      base_sha: ${{ steps.setup.outputs.base_sha }}
      pr_number: ${{ steps.setup.outputs.pr_number }}
      checkout_path: ${{ steps.setup.outputs.checkout_path }}
      has_changes: ${{ steps.setup.outputs.has_changes }}
    steps:
      - name: Workflow setup
        id: setup
        uses: Framework-R-D/action-workflow-setup@f73307dd8c13cb66c2565c9ace32571517b1cea8 # v1
        with:
          file-type: cpp
          head-ref: ${{ inputs.pr-head-sha }}
          ref: ${{ inputs.ref }}
          repo: ${{ inputs.repo }}
          pr-base-sha: ${{ inputs.pr-base-sha }}
          checkout-path: ${{ inputs.checkout-path }}

  header-guards-check:
    needs: setup
    if: >
      always() && (
        github.event_name == 'workflow_dispatch' ||
        inputs.skip-relevance-check ||
        needs.setup.outputs.has_changes == 'true'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb95f68b377484df746e50259b3f3e1b745 # v7.0.0
        with:
          ref: ${{ needs.setup.outputs.ref }}
          path: ${{ needs.setup.outputs.checkout_path }}
          repository: ${{ needs.setup.outputs.repo }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Check header guards
        id: check
        working-directory: ${{ needs.setup.outputs.checkout_path }}
        run: |
          python3 scripts/fix_header_guards.py --check --root . phlex plugins form > check_output.txt 2>&1 || echo "has_issues=true" >> "$GITHUB_OUTPUT"
          cat check_output.txt

      - name: Report results
        if: always() && steps.check.outputs.has_issues == 'true'
        env:
          REPO: ${{ needs.setup.outputs.repo }}
        run: |
          REPO_NAME="${REPO##*/}"
          echo "::error::Header guard check failed."
          echo "::error::Comment '@${REPO_NAME}bot header-guards-fix' on the PR to auto-fix."
          exit 1
