name: Clang-Tidy Check
"run-name": "${{ github.actor }} checking C++ code with clang-tidy"

permissions:
  contents: read
  pull-requests: read

"on":
  pull_request:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      ref:
        description: "The branch, ref, or SHA to checkout. Defaults to the repository's default branch."
        required: false
        type: string

jobs:
  setup:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' || (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(fromJSON('["OWNER", "COLLABORATOR", "MEMBER"]'), github.event.comment.author_association) &&
        startsWith(github.event.comment.body, '@phlexbot tidy-check')
      )
    outputs:
      is_act: ${{ steps.setup.outputs.is_act }}
      ref: ${{ steps.setup.outputs.ref }}
      repo: ${{ steps.setup.outputs.repo }}
      base_sha: ${{ steps.setup.outputs.base_sha }}
      pr_number: ${{ steps.setup.outputs.pr_number }}
      checkout_path: ${{ steps.setup.outputs.checkout_path }}
      build_path: ${{ steps.setup.outputs.build_path }}
      has_changes: ${{ steps.setup.outputs.has_changes }}
    steps:
      - name: Workflow setup
        id: setup
        uses: Framework-R-D/phlex/.github/actions/workflow-setup@copilot/sub-pr-411-another-one
        with:
          file-type: |
            cpp
            cmake

  clang-tidy-check:
    needs: setup
    if: >
      always() && needs.setup.outputs.has_changes == 'true'
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/framework-r-d/phlex-ci:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.setup.outputs.ref }}
          path: ${{ needs.setup.outputs.checkout_path }}
          repository: ${{ needs.setup.outputs.repo }}

      - name: Setup build environment
        uses: Framework-R-D/phlex/.github/actions/setup-build-env@copilot/sub-pr-411-another-one
        with:
          build-path: ${{ needs.setup.outputs.build_path }}

      - name: Configure CMake (Debug)
        uses: Framework-R-D/phlex/.github/actions/configure-cmake@copilot/sub-pr-411-another-one
        with:
          build-type: Debug
          source-path: ${{ needs.setup.outputs.checkout_path }}
          build-path: ${{ needs.setup.outputs.build_path }}
          extra-options:
            "-DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DCMAKE_CXX_SCAN_FOR_MODULES=OFF
            -DCMAKE_CXX_CLANG_TIDY='clang-tidy;--export-fixes=clang-tidy-fixes.yaml'"

      - name: Run clang-tidy using CMake
        id: tidy
        shell: bash
        run: |
          . /entrypoint.sh
          cd "$GITHUB_WORKSPACE/${{ needs.setup.outputs.build_path }}"

          echo "➡️ Running clang-tidy checks..."
          cmake_status=0
          cmake --build . -j "$(nproc)" > clang-tidy.log 2>&1 || cmake_status=$?

          if [ "$cmake_status" -ne 0 ]; then
            echo "::error::CMake build failed with exit code $cmake_status"
            exit 1
          elif grep -qE '^/.+\.(cpp|hpp|c|h):[0-9]+:[0-9]+: (warning|error):' clang-tidy.log; then
            echo "::warning::Clang-tidy found issues in the code"
          else
            echo "✅ clang-tidy check passed"
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: clang-tidy-check
          path: |
            ${{ needs.setup.outputs.build_path }}/clang-tidy-fixes.yaml
            ${{ needs.setup.outputs.build_path }}/clang-tidy.log
          retention-days: 7
          if-no-files-found: ignore

  report:
    needs: [setup, clang-tidy-check]
    if: always() && needs.setup.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Post Clang-Tidy results
        uses: Framework-R-D/phlex/.github/actions/post-clang-tidy-results@copilot/sub-pr-411-another-one
        with:
          build-path: ${{ needs.setup.outputs.build_path }}
          pr-number: ${{ needs.setup.outputs.pr_number }}
          post-summary: "true"
