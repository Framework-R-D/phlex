name: Phlex Continuous Integration
run-name: ${{ github.actor }} building and testing Phlex

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ubuntu-24.04

    container: ghcr.io/framework-r-d/phlex-ci:2025-08-12
  
    steps:
    - name: Check out main branch from github
      uses: actions/checkout@v4
      with:
        path: src
  
    #TODO: Turn this back on once the repository matches our formatting requirements.  Can I get it to only process new changes?
    #- name: Check clang-format
    #  uses: DoozyX/clang-format-lint-action@v0.20
    #  with:
    #    clangFormatVersion: 20
  
    - name: Set up Spack
      run: |
        echo "PWD: "
        ls -lathr
        echo "/: "
        ls -lathr /
        echo "HOME: "
        ls -lathr ${HOME}
        pwd
        . spack/share/spack/setup-env.sh
        spack env activate PHLEXDEV

    - name: CMake build
      run: |
        mkdir -p ${{ github.workspace }}/opt/build
        cd ${{ github.workspace }}/opt/build
        cmake ${{ github.workspace }}/src -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/opt -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DPHLEX_USE_FORM=ON -DFORM_USE_ROOT_STORAGE=ON
        make install -j
    - name: Run tests
      run:
        ctest -j -C ${{ env.BUILD_TYPE }} --test-dir ${{ github.workspace }}/opt/build
