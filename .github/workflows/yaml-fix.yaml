name: YAML Fix
"run-name": "${{ github.actor }} fixing YAML files"

"on":
  issue_comment:
    types:
      - created
  workflow_dispatch:
    inputs:
      ref:
        description:
          "The branch name to checkout and push fixes to (must be a branch, not a commit SHA). Defaults to the
          repository's default branch."
        required: false
        type: string
  workflow_call:
    inputs:
      checkout-path:
        description: "Path to check out code to"
        required: false
        type: string
      ref:
        description: "The branch name to checkout and push fixes to (must be a branch, not a commit SHA)"
        required: true
        type: string
      repo:
        description: "The repository to checkout from"
        required: true
        type: string
      skip-comment:
        description: "Skip posting PR comments"
        required: false
        type: string
        default: "false"
    outputs:
      changes:
        description: "Whether any fixes were applied"
        value: ${{ jobs.apply_yaml_fixes.outputs.changes }}
      pushed:
        description: "Whether the fixes were pushed to the remote branch"
        value: ${{ jobs.apply_yaml_fixes.outputs.pushed }}
      commit_sha:
        description: "The full commit SHA of the applied fixes"
        value: ${{ jobs.apply_yaml_fixes.outputs.commit_sha }}
      commit_sha_short:
        description: "The short commit SHA of the applied fixes"
        value: ${{ jobs.apply_yaml_fixes.outputs.commit_sha_short }}
      patch_name:
        description: "Name of the patch file if fixes could not be pushed"
        value: ${{ jobs.apply_yaml_fixes.outputs.patch_name }}

permissions:
  pull-requests: write
  contents: write

env:
  local_checkout_path: ${{ inputs.checkout-path || format('{0}-src', github.event.repository.name) }}

jobs:
  pre-check:
    runs-on: ubuntu-latest
    name: Parse command
    if: >
      github.event_name == 'workflow_dispatch' || inputs.ref != '' || (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(fromJSON('["OWNER", "COLLABORATOR", "MEMBER"]'), github.event.comment.author_association) &&
        startsWith(github.event.comment.body, format('@{0}bot yaml-fix', github.event.repository.name))
      )
    # Authorization: Only OWNER, COLLABORATOR, or MEMBER can trigger via comments.
    # This covers repo owners, invited collaborators, and all org members.
    outputs:
      ref: ${{ steps.prepare.outputs.ref }}
      repo: ${{ steps.prepare.outputs.repo }}
    steps:
      - name: Prepare outputs
        id: prepare
        uses: Framework-R-D/phlex/.github/actions/prepare-fix-outputs@main
        with:
          ref: ${{ inputs.ref }}
          repo: ${{ inputs.repo }}

  apply_yaml_fixes:
    runs-on: ubuntu-latest
    name: Apply YAML fixes
    needs: pre-check
    if: ${{ needs.pre-check.result == 'success' }}
    outputs:
      changes: ${{ steps.handle_commit.outputs.changes }}
      pushed: ${{ steps.handle_commit.outputs.pushed }}
      commit_sha: ${{ steps.handle_commit.outputs.commit_sha }}
      commit_sha_short: ${{ steps.handle_commit.outputs.commit_sha_short }}
      patch_name: ${{ steps.handle_commit.outputs.patch_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: ${{ env.local_checkout_path }}
          ref: ${{ needs.pre-check.outputs.ref }}
          repository: ${{ needs.pre-check.outputs.repo }}
          token: ${{ secrets.WORKFLOW_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20.x"

      - name: Install prettier
        run: npm install -g prettier

      - name: Apply YAML formatting
        run: |
          cd ${{ env.local_checkout_path }}
          prettier --write '**/*.{yaml,yml}'

      - name: Handle fix commit
        id: handle_commit
        uses: Framework-R-D/phlex/.github/actions/handle-fix-commit@main
        with:
          tool: YAML formatter
          working-directory: ${{ env.local_checkout_path }}
          token: ${{ secrets.WORKFLOW_PAT }}
          pr-info-ref: ${{ needs.pre-check.outputs.ref }}
          pr-info-repo: ${{ needs.pre-check.outputs.repo }}
          skip-comment: ${{ inputs.skip-comment || 'false' }}

      - name: Update PR comment reactions
        if: always() && github.event_name == 'issue_comment' && inputs.skip-comment != 'true'
        uses: Framework-R-D/phlex/.github/actions/complete-pr-comment@main
        with:
          status: ${{ job.status }}
