name: Format All
run-name: "${{ github.actor }} fixing all format issues"

on:
  issue_comment:
    types:
      - created

permissions:
  pull-requests: write
  contents: write
  issues: write

jobs:
  setup:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(fromJSON('["OWNER",
      "COLLABORATOR", "MEMBER"]'), github.event.comment.author_association) && startsWith(github.event.comment.body,
      format('@{0}bot format', github.event.repository.name))
    outputs:
      ref: ${{ steps.setup.outputs.ref }}
      repo: ${{ steps.setup.outputs.repo }}
    steps:
      - name: Workflow setup
        id: setup
        uses: Framework-R-D/phlex/.github/actions/workflow-setup@main
        with:
          mode: fix

  clang-format:
    needs: setup
    uses: ./.github/workflows/clang-format-fix.yaml
    with:
      ref: ${{ needs.setup.outputs.ref }}
      repo: ${{ needs.setup.outputs.repo }}
      skip-comment: "true"
    secrets: inherit

  cmake-format:
    needs: setup
    uses: ./.github/workflows/cmake-format-fix.yaml
    with:
      ref: ${{ needs.setup.outputs.ref }}
      repo: ${{ needs.setup.outputs.repo }}
      skip-comment: "true"
    secrets: inherit

  header-guards:
    needs: setup
    uses: ./.github/workflows/header-guards-fix.yaml
    with:
      ref: ${{ needs.setup.outputs.ref }}
      repo: ${{ needs.setup.outputs.repo }}
      skip-comment: "true"
    secrets: inherit

  jsonnet-format:
    needs: setup
    uses: ./.github/workflows/jsonnet-format-fix.yaml
    with:
      ref: ${{ needs.setup.outputs.ref }}
      repo: ${{ needs.setup.outputs.repo }}
      skip-comment: "true"
    secrets: inherit

  markdown:
    needs: setup
    uses: ./.github/workflows/markdown-fix.yaml
    with:
      ref: ${{ needs.setup.outputs.ref }}
      repo: ${{ needs.setup.outputs.repo }}
      skip-comment: "true"
    secrets: inherit

  python:
    needs: setup
    uses: ./.github/workflows/python-fix.yaml
    with:
      ref: ${{ needs.setup.outputs.ref }}
      repo: ${{ needs.setup.outputs.repo }}
      skip-comment: "true"
    secrets: inherit

  yaml:
    needs: setup
    uses: ./.github/workflows/yaml-fix.yaml
    with:
      ref: ${{ needs.setup.outputs.ref }}
      repo: ${{ needs.setup.outputs.repo }}
      skip-comment: "true"
    secrets: inherit

  combine-results:
    needs: [setup, clang-format, cmake-format, header-guards, jsonnet-format, markdown, python, yaml]
    if: always() && needs.setup.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Collect results
        id: collect
        uses: Framework-R-D/phlex/.github/actions/collect-format-results@main
        with:
          results-json: |
            {
              "clang-format": { "result": "${{ needs.clang-format.result }}", "changes": "${{ needs.clang-format.outputs.changes }}", "pushed": "${{ needs.clang-format.outputs.pushed }}", "sha": "${{ needs.clang-format.outputs.commit_sha_short }}", "patch_name": "${{ needs.clang-format.outputs.patch_name }}" },
              "cmake-format": { "result": "${{ needs.cmake-format.result }}", "changes": "${{ needs.cmake-format.outputs.changes }}", "pushed": "${{ needs.cmake-format.outputs.pushed }}", "sha": "${{ needs.cmake-format.outputs.commit_sha_short }}", "patch_name": "${{ needs.cmake-format.outputs.patch_name }}" },
              "header-guards": { "result": "${{ needs.header-guards.result }}", "changes": "${{ needs.header-guards.outputs.changes }}", "pushed": "${{ needs.header-guards.outputs.pushed }}", "sha": "${{ needs.header-guards.outputs.commit_sha_short }}", "patch_name": "${{ needs.header-guards.outputs.patch_name }}" },
              "jsonnetfmt": { "result": "${{ needs.jsonnet-format.result }}", "changes": "${{ needs.jsonnet-format.outputs.changes }}", "pushed": "${{ needs.jsonnet-format.outputs.pushed }}", "sha": "${{ needs.jsonnet-format.outputs.commit_sha_short }}", "patch_name": "${{ needs.jsonnet-format.outputs.patch_name }}" },
              "markdownlint": { "result": "${{ needs.markdown.result }}", "changes": "${{ needs.markdown.outputs.changes }}", "pushed": "${{ needs.markdown.outputs.pushed }}", "sha": "${{ needs.markdown.outputs.commit_sha_short }}", "patch_name": "${{ needs.markdown.outputs.patch_name }}" },
              "ruff": { "result": "${{ needs.python.result }}", "changes": "${{ needs.python.outputs.changes }}", "pushed": "${{ needs.python.outputs.pushed }}", "sha": "${{ needs.python.outputs.commit_sha_short }}", "patch_name": "${{ needs.python.outputs.patch_name }}" },
              "YAML formatter": { "result": "${{ needs.yaml.result }}", "changes": "${{ needs.yaml.outputs.changes }}", "pushed": "${{ needs.yaml.outputs.pushed }}", "sha": "${{ needs.yaml.outputs.commit_sha_short }}", "patch_name": "${{ needs.yaml.outputs.patch_name }}" }
            }

      - name: Post combined comment
        uses: thollander/actions-comment-pull-request@24bffb9b452ba05a4f3f77933840a6a841d1b32b # v3.0.1
        with:
          message: ${{ steps.collect.outputs.message }}

      - name: Update PR comment reactions
        uses: Framework-R-D/phlex/.github/actions/complete-pr-comment@main
        with:
          status: ${{ steps.collect.outputs.has_failures == 'true' && 'failure' || 'success' }}
