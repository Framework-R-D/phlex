name: "Workflow Setup"
description: "Handles ref resolution, environment detection, and change detection in a single step."
inputs:
  mode:
    description: "Workflow mode ('check' or 'fix')"
    required: true
    default: "check"
  ref:
    description: "Manual ref override"
    required: false
  repo:
    description: "Manual repo override"
    required: false
  pr-base-sha:
    description: "Manual base SHA override (check mode only)"
    required: false
  checkout-path:
    description: "Manual checkout path override"
    required: false
  build-path:
    description: "Manual build path override"
    required: false
  file-type:
    description: "File type for change detection (e.g., cpp, python)"
    required: false
  include-globs:
    description: "Include globs for change detection"
    required: false
  exclude-globs:
    description: "Exclude globs for change detection"
    required: false

outputs:
  is_act:
    description: "Whether running in act"
    value: ${{ steps.prepare.outputs.is_act }}
  ref:
    description: "Resolved ref"
    value: ${{ steps.prepare.outputs.ref }}
  repo:
    description: "Resolved repository"
    value: ${{ steps.prepare.outputs.repo }}
  base_sha:
    description: "Resolved base SHA"
    value: ${{ steps.prepare.outputs.base_sha }}
  pr_number:
    description: "PR number"
    value: ${{ steps.prepare.outputs.pr_number }}
  checkout_path:
    description: "Resolved checkout path"
    value: ${{ steps.prepare.outputs.checkout_path }}
  build_path:
    description: "Resolved build path"
    value: ${{ steps.prepare.outputs.build_path }}
  has_changes:
    description: "Whether relevant changes were detected"
    value: ${{ steps.detect.outputs.has_changes }}

runs:
  using: "composite"
  steps:
    - name: Prepare basic outputs (check mode)
      if: inputs.mode == 'check'
      id: prepare_check
      uses: Framework-R-D/phlex/.github/actions/prepare-check-outputs@jules-maintenance-fix-pr-comment-reactions-18132869807280577001
      with:
        ref: ${{ inputs.ref }}
        repo: ${{ inputs.repo }}
        pr-base-sha: ${{ inputs.pr-base-sha }}
        checkout-path: ${{ inputs.checkout-path }}
        build-path: ${{ inputs.build-path }}

    - name: Prepare basic outputs (fix mode)
      if: inputs.mode == 'fix'
      id: prepare_fix
      uses: Framework-R-D/phlex/.github/actions/prepare-fix-outputs@jules-maintenance-fix-pr-comment-reactions-18132869807280577001
      with:
        ref: ${{ inputs.ref }}
        repo: ${{ inputs.repo }}
        checkout-path: ${{ inputs.checkout-path }}

    - name: Standardize outputs
      id: prepare
      shell: bash
      run: |
        if [ "${{ inputs.mode }}" == "check" ]; then
          echo "is_act=${{ steps.prepare_check.outputs.is_act }}" >> "$GITHUB_OUTPUT"
          echo "ref=${{ steps.prepare_check.outputs.ref }}" >> "$GITHUB_OUTPUT"
          echo "repo=${{ steps.prepare_check.outputs.repo }}" >> "$GITHUB_OUTPUT"
          echo "base_sha=${{ steps.prepare_check.outputs.base_sha }}" >> "$GITHUB_OUTPUT"
          echo "pr_number=${{ steps.prepare_check.outputs.pr_number }}" >> "$GITHUB_OUTPUT"
          echo "checkout_path=${{ steps.prepare_check.outputs.checkout_path }}" >> "$GITHUB_OUTPUT"
          echo "build_path=${{ steps.prepare_check.outputs.build_path }}" >> "$GITHUB_OUTPUT"
        else
          echo "is_act=false" >> "$GITHUB_OUTPUT"
          echo "ref=${{ steps.prepare_fix.outputs.ref }}" >> "$GITHUB_OUTPUT"
          echo "repo=${{ steps.prepare_fix.outputs.repo }}" >> "$GITHUB_OUTPUT"
          echo "base_sha=" >> "$GITHUB_OUTPUT"
          echo "pr_number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          echo "checkout_path=${{ steps.prepare_fix.outputs.checkout_path }}" >> "$GITHUB_OUTPUT"
          echo "build_path=" >> "$GITHUB_OUTPUT"
        fi

    - name: Run change detection
      id: detect
      if: inputs.file-type != '' || inputs.include-globs != ''
      uses: Framework-R-D/phlex/.github/actions/run-change-detection@jules-maintenance-fix-pr-comment-reactions-18132869807280577001
      with:
        checkout-path: ${{ steps.prepare.outputs.checkout_path }}
        ref: ${{ steps.prepare.outputs.ref }}
        repo: ${{ steps.prepare.outputs.repo }}
        base-ref: ${{ steps.prepare.outputs.base_sha }}
        file-type: ${{ inputs.file-type }}
        include-globs: ${{ inputs.include-globs }}
        exclude-globs: ${{ inputs.exclude-globs }}
