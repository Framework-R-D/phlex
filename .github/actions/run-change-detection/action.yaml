name: "Run Change Detection"
description: "Encapsulates checkout, detection of relevant changes, and reporting."
inputs:
  checkout-path:
    description: "Path to check out code to"
    required: true
  ref:
    description: "The branch, ref, or SHA to checkout"
    required: true
  repo:
    description: "The repository to checkout from"
    required: true
  base-ref:
    description: "The base ref for comparison"
    required: true
  file-type:
    description: "Predefined file type (cpp, python, cmake, jsonnet, yaml, md)"
    required: false
  include-globs:
    description: "Custom include globs"
    required: false
  exclude-globs:
    description: "Custom exclude globs"
    required: false
  head-ref:
    description: "Explicit head ref (defaults to inputs.ref)"
    required: false

outputs:
  has_changes:
    description: "Whether relevant changes were detected"
    value: ${{ steps.filter.outputs.matched }}
  matched_files:
    description: "The list of matched files"
    value: ${{ steps.filter.outputs.matched_files }}

runs:
  using: "composite"
  steps:
    - name: Check out source code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        path: ${{ inputs.checkout-path }}
        # This action is never called from a pull_request_target workflow; all callers
        # use pull_request, issue_comment, workflow_dispatch, or workflow_call triggers.
        # Even if it were called from pull_request_target, the empty sparse checkout
        # below ensures no files from the ref are materialized on disk — only git
        # objects are fetched — so no code from the PR is ever executed.
        # codeql[actions/pull-request-target-injection]
        ref: ${{ inputs.ref }}
        repository: ${{ inputs.repo }}
        persist-credentials: false
        # Use empty sparse checkout so no PR files are materialized in the working
        # tree — only git objects are needed for diff and ls-tree operations.
        sparse-checkout-cone-mode: false
        sparse-checkout: ""

    - name: Detect relevant changes
      id: filter
      uses: Framework-R-D/phlex/.github/actions/detect-relevant-changes@main
      with:
        repo-path: ${{ inputs.checkout-path }}
        base-ref: ${{ inputs.base-ref }}
        head-ref: ${{ inputs.head-ref || inputs.ref }}
        file-type: ${{ inputs.file-type }}
        include-globs: ${{ inputs.include-globs }}
        exclude-globs: ${{ inputs.exclude-globs }}

    - name: Report detection outcome
      shell: bash
      env:
        FILTER_MATCHED: ${{ steps.filter.outputs.matched }}
        FILTER_MATCHED_FILES: ${{ steps.filter.outputs.matched_files }}
        INPUT_FILE_TYPE: ${{ inputs.file-type }}
      run: |
        if [ "${FILTER_MATCHED}" != "true" ]; then
          echo "::notice::No relevant changes detected for ${INPUT_FILE_TYPE:-custom globs}; job will be skipped."
        else
          echo "::group::Relevant files detected"
          printf '%s\n' "${FILTER_MATCHED_FILES}"
          echo "::endgroup::"
        fi
